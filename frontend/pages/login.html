<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bizflow – Login</title>
<link rel="stylesheet" href="../css/style.css">
<style>
body { background: #0f172a; }
.login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.login-card { background: #fff; border-radius: 16px; padding: 40px; width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,.4); }
.login-logo { text-align: center; margin-bottom: 32px; }
.login-logo .brand { font-size: 30px; font-weight: 700; color: var(--brand); letter-spacing: 2px; }
.login-logo .sub { color: var(--text2); font-size: 12px; margin-top: 4px; letter-spacing: .5px; text-transform: uppercase; }
.login-error { background: #fee2e2; color: #991b1b; border-radius: 7px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px; display: none; }
.login-btn { width: 100%; padding: 11px; background: var(--brand); color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; letter-spacing: .5px; transition: .15s; font-family: inherit; }
.login-btn:hover { background: var(--brand-dark); }
.login-footer { text-align: center; margin-top: 20px; color: var(--text3); font-size: 11px; }
</style>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="brand">BIZFLOW</div>
      <div class="sub">Inventory &amp; GST Billing System</div>
    </div>
    <div id="login-error" class="login-error"></div>
    <div class="form-group">
      <label class="form-label">Username</label>
      <input id="username" class="form-control" type="text" placeholder="Enter username" autocomplete="username">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input id="password" class="form-control" type="password" placeholder="Enter password" autocomplete="current-password">
    </div>
    <button class="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-footer">Default: admin / admin123</div>
  </div>
</div>
<script>
async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const err = document.getElementById('login-error');
  err.style.display = 'none';
  if (!username || !password) { err.textContent = 'Please enter username and password'; err.style.display = 'block'; return; }
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (!res.ok) { err.textContent = data.error || 'Login failed'; err.style.display = 'block'; return; }
    localStorage.setItem('bf_token', data.token);
    localStorage.setItem('bf_user', data.username);
    window.location.href = '/pages/dashboard.html';
  } catch (e) {
    err.textContent = 'Cannot connect to server. Is the backend running?';
    err.style.display = 'block';
  }
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
if (localStorage.getItem('bf_token')) window.location.href = '/pages/dashboard.html';
</script>
</body>
</html>
