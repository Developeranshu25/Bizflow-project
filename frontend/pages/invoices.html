<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoices – Bizflow</title>
<link rel="stylesheet" href="../css/style.css">
<style>
.inv-detail { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
.inv-detail-item { font-size: 13px; }
.inv-detail-item .lbl { color: var(--text2); font-size: 11px; text-transform: uppercase; letter-spacing:.4px; margin-bottom:3px; }
.items-mini { width:100%; border-collapse:collapse; font-size:13px; }
.items-mini th { text-align:left; font-size:11px; color:var(--text2); padding:6px 8px; border-bottom:1px solid var(--border); font-weight:600; text-transform:uppercase; }
.items-mini td { padding:7px 8px; border-bottom:1px solid var(--border); }
.items-mini tr:last-child td { border-bottom:none; }
</style>
</head>
<body>
<div class="app-layout" id="app">
  <div class="main-content">
    <div class="topbar">
      <span class="topbar-title">Invoices</span>
      <div class="topbar-actions">
        <div class="search-bar">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input id="search" type="text" placeholder="Search invoice / party..." oninput="filterInvoices()">
        </div>
        <select id="status-filter" class="form-control" style="width:130px" onchange="filterInvoices()">
          <option value="">All Status</option>
          <option value="paid">Paid</option>
          <option value="unpaid">Unpaid</option>
          <option value="partial">Partial</option>
        </select>
        <a href="new-invoice.html" class="btn btn-primary">
          <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Invoice
        </a>
      </div>
    </div>
    <div class="page-content">
      <div class="card">
        <div class="table-wrap">
          <table class="table">
            <thead>
              <tr>
                <th>Invoice No</th>
                <th>Party</th>
                <th>Date</th>
                <th>Subtotal</th>
                <th>GST</th>
                <th>Total</th>
                <th>Method</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="invoices-tbody">
              <tr><td colspan="9" style="text-align:center;padding:40px;color:var(--text3)">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Invoice detail modal -->
<div class="modal-backdrop" id="inv-modal">
  <div class="modal" style="max-width:640px">
    <div class="modal-header">
      <span class="modal-title" id="inv-modal-title">Invoice Details</span>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn btn-secondary btn-sm" id="btn-pdf" onclick="downloadPDF()">
          <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          PDF
        </button>
        <button class="modal-close" onclick="closeModal('inv-modal')">
          <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>
    <div class="modal-body" id="inv-modal-body">Loading...</div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/sidebar.js"></script>
<script>
document.getElementById('app').insertAdjacentHTML('afterbegin', renderSidebar('invoices.html'));
requireAuth();

let allInvoices = [], currentInvId = null;

async function load() {
  try {
    allInvoices = await api.get('/invoices');
    renderTable(allInvoices);
    const params = new URLSearchParams(location.search);
    if (params.get('id')) viewInvoice(parseInt(params.get('id')));
  } catch(e) { showToast(e.message, 'error'); }
}

function renderTable(invoices) {
  const tbody = document.getElementById('invoices-tbody');
  if (!invoices.length) {
    tbody.innerHTML = `<tr><td colspan="9"><div class="empty-state"><p>No invoices found.</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = invoices.map(inv => {
    const gst = parseFloat(inv.cgst_amount||0) + parseFloat(inv.sgst_amount||0);
    return `<tr>
      <td><strong>${inv.invoice_no}</strong></td>
      <td>${inv.party_name || '<span style="color:var(--text3)">Walk-in</span>'}</td>
      <td>${fmtDate(inv.created_at)}</td>
      <td>${fmtRupee(inv.subtotal)}</td>
      <td style="color:var(--text2)">${fmtRupee(gst)}</td>
      <td><strong>${fmtRupee(inv.total)}</strong></td>
      <td><span class="badge badge-info">${(inv.payment_method||'').toUpperCase()}</span></td>
      <td>${statusBadge(inv.status)}</td>
      <td>
        <div class="actions">
          <button class="btn btn-secondary btn-sm" onclick="viewInvoice(${inv.id})">View</button>
          <button class="btn btn-danger btn-sm btn-icon" onclick="deleteInvoice(${inv.id}, '${inv.invoice_no}')" title="Delete">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" width="13" height="13"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
          </button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function filterInvoices() {
  const q = document.getElementById('search').value.toLowerCase();
  const st = document.getElementById('status-filter').value;
  const filtered = allInvoices.filter(inv =>
    (!q || inv.invoice_no.toLowerCase().includes(q) || (inv.party_name||'').toLowerCase().includes(q)) &&
    (!st || inv.status === st)
  );
  renderTable(filtered);
}

async function viewInvoice(id) {
  currentInvId = id;
  document.getElementById('inv-modal-title').textContent = 'Loading...';
  document.getElementById('inv-modal-body').innerHTML = '<div style="padding:30px;text-align:center;color:var(--text3)">Loading...</div>';
  openModal('inv-modal');
  try {
    const inv = await api.get('/invoices/' + id);
    document.getElementById('inv-modal-title').textContent = inv.invoice_no;
    const gst = parseFloat(inv.cgst_amount) + parseFloat(inv.sgst_amount);
    document.getElementById('inv-modal-body').innerHTML = `
      <div class="inv-detail">
        <div class="inv-detail-item"><div class="lbl">Party</div><div>${inv.party_name || 'Walk-in Customer'}</div></div>
        <div class="inv-detail-item"><div class="lbl">Date</div><div>${fmtDate(inv.created_at)}</div></div>
        <div class="inv-detail-item"><div class="lbl">Payment Method</div><div><span class="badge badge-info">${(inv.payment_method||'').toUpperCase()}</span></div></div>
        <div class="inv-detail-item"><div class="lbl">Status</div><div>${statusBadge(inv.status)}</div></div>
        ${inv.party_phone ? `<div class="inv-detail-item"><div class="lbl">Phone</div><div>${inv.party_phone}</div></div>` : ''}
        ${inv.party_gstin ? `<div class="inv-detail-item"><div class="lbl">GSTIN</div><div style="font-family:var(--font-mono)">${inv.party_gstin}</div></div>` : ''}
      </div>
      <table class="items-mini" style="margin-bottom:16px">
        <thead><tr><th>Product</th><th>Rate</th><th>Qty</th><th>Unit</th><th style="text-align:right">Amount</th></tr></thead>
        <tbody>
          ${(inv.items||[]).map(it => `<tr>
            <td>${it.product_name}</td>
            <td>${fmtRupee(it.rate)}</td>
            <td>${it.quantity}</td>
            <td style="color:var(--text2)">${it.unit||'pcs'}</td>
            <td style="text-align:right"><strong>${fmtRupee(it.line_total)}</strong></td>
          </tr>`).join('')}
        </tbody>
      </table>
      <div class="totals-box">
        <div class="totals-row"><span>Subtotal</span><span>${fmtRupee(inv.subtotal)}</span></div>
        <div class="totals-row"><span>CGST (${inv.cgst_rate}%)</span><span>${fmtRupee(inv.cgst_amount)}</span></div>
        <div class="totals-row"><span>SGST (${inv.sgst_rate}%)</span><span>${fmtRupee(inv.sgst_amount)}</span></div>
        <div class="totals-row"><span>TOTAL</span><span style="font-size:17px;color:var(--brand)">${fmtRupee(inv.total)}</span></div>
      </div>
      ${inv.notes ? `<p style="margin-top:12px;font-size:12px;color:var(--text2)">Note: ${inv.notes}</p>` : ''}
    `;
  } catch(e) { showToast(e.message, 'error'); }
}

async function downloadPDF() {
  if (!currentInvId) return;
  const inv = allInvoices.find(i => i.id === currentInvId);
  await api.download('/invoices/' + currentInvId + '/pdf', `invoice-${inv?.invoice_no || currentInvId}.pdf`);
}

async function deleteInvoice(id, no) {
  if (!confirm(`Delete invoice ${no}? This cannot be undone.`)) return;
  try {
    await api.del('/invoices/' + id);
    showToast('Invoice deleted', 'success');
    await load();
  } catch(e) { showToast(e.message, 'error'); }
}

load();
</script>
</body>
</html>
