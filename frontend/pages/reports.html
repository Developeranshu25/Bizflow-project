<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reports – Bizflow</title>
<link rel="stylesheet" href="../css/style.css">
<style>
.report-tabs { display: flex; gap: 4px; background: var(--surface2); padding: 4px; border-radius: 9px; margin-bottom: 20px; width: fit-content; }
.report-tab { padding: 8px 20px; border-radius: 7px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; background: transparent; color: var(--text2); transition: .15s; }
.report-tab.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow); }
.report-section { display: none; }
.report-section.active { display: block; }
.summary-strip { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.sum-box { background: var(--surface); border: 1px solid var(--border); border-radius: 9px; padding: 14px 18px; min-width: 140px; }
.sum-box .lbl { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing:.4px; margin-bottom:4px; }
.sum-box .val { font-size: 20px; font-weight: 600; color: var(--text); }
.sum-box .val.brand { color: var(--brand); }
</style>
</head>
<body>
<div class="app-layout" id="app">
  <div class="main-content">
    <div class="topbar">
      <span class="topbar-title">Reports</span>
    </div>
    <div class="page-content">

      <div class="report-tabs">
        <button class="report-tab active" onclick="showTab('stock')">Stock Report</button>
        <button class="report-tab" onclick="showTab('sales')">Monthly Sales</button>
      </div>

      <!-- Stock Report -->
      <div class="report-section active" id="tab-stock">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
          <div style="display:flex;gap:10px;align-items:center">
            <select id="stock-cat" class="form-control" style="width:180px" onchange="loadStock()">
              <option value="">All Categories</option>
            </select>
          </div>
          <button class="btn btn-primary" onclick="downloadStock()">
            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download PDF
          </button>
        </div>
        <div id="stock-summary" class="summary-strip"></div>
        <div class="card">
          <div class="table-wrap">
            <table class="table">
              <thead>
                <tr><th>#</th><th>Product</th><th>Category</th><th>Price</th><th>Stock</th><th>Unit</th><th>Stock Value</th></tr>
              </thead>
              <tbody id="stock-tbody">
                <tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text3)">Loading...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Monthly Sales -->
      <div class="report-section" id="tab-sales">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px">
          <div style="display:flex;gap:10px;align-items:center">
            <select id="sales-month" class="form-control" style="width:130px" onchange="loadSales()">
              <option value="1">January</option><option value="2">February</option>
              <option value="3">March</option><option value="4">April</option>
              <option value="5">May</option><option value="6">June</option>
              <option value="7">July</option><option value="8">August</option>
              <option value="9">September</option><option value="10">October</option>
              <option value="11">November</option><option value="12">December</option>
            </select>
            <select id="sales-year" class="form-control" style="width:100px" onchange="loadSales()"></select>
          </div>
          <button class="btn btn-primary" onclick="downloadSales()">
            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download PDF
          </button>
        </div>
        <div id="sales-summary" class="summary-strip"></div>
        <div class="card">
          <div class="table-wrap">
            <table class="table">
              <thead>
                <tr><th>Invoice No</th><th>Party</th><th>Date</th><th>Subtotal</th><th>CGST</th><th>SGST</th><th>Total</th><th>Method</th><th>Status</th></tr>
              </thead>
              <tbody id="sales-tbody">
                <tr><td colspan="9" style="text-align:center;padding:40px;color:var(--text3)">Loading...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/sidebar.js"></script>
<script>
document.getElementById('app').insertAdjacentHTML('afterbegin', renderSidebar('reports.html'));
requireAuth();

// Init year selector
const yearSel = document.getElementById('sales-year');
const now = new Date();
for (let y = now.getFullYear(); y >= now.getFullYear() - 4; y--) {
  const o = document.createElement('option'); o.value = y; o.textContent = y;
  yearSel.appendChild(o);
}
document.getElementById('sales-month').value = now.getMonth() + 1;

function showTab(tab) {
  document.querySelectorAll('.report-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.report-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  event.target.classList.add('active');
}

async function loadStock() {
  try {
    const cat = document.getElementById('stock-cat').value;
    const products = await api.get('/reports/stock' + (cat ? '?category=' + encodeURIComponent(cat) : ''));
    
    // Load categories into select
    if (!cat) {
      const cats = [...new Set(products.map(p => p.category).filter(Boolean))].sort();
      const sel = document.getElementById('stock-cat');
      while (sel.options.length > 1) sel.remove(1);
      cats.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; sel.appendChild(o); });
    }

    const totalItems = products.length;
    const lowStock = products.filter(p => p.quantity <= 5).length;
    const totalValue = products.reduce((s, p) => s + parseFloat(p.price) * p.quantity, 0);

    document.getElementById('stock-summary').innerHTML = `
      <div class="sum-box"><div class="lbl">Total Products</div><div class="val">${totalItems}</div></div>
      <div class="sum-box"><div class="lbl">Low Stock (≤5)</div><div class="val" style="color:var(--danger)">${lowStock}</div></div>
      <div class="sum-box"><div class="lbl">Stock Value</div><div class="val brand">${fmtRupee(totalValue)}</div></div>`;

    const tbody = document.getElementById('stock-tbody');
    if (!products.length) { tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><p>No products found.</p></div></td></tr>`; return; }
    tbody.innerHTML = products.map((p, i) => {
      const low = p.quantity <= 5;
      const val = parseFloat(p.price) * p.quantity;
      return `<tr>
        <td style="color:var(--text3)">${i+1}</td>
        <td><strong>${p.name}</strong></td>
        <td><span class="badge badge-gray">${p.category||'General'}</span></td>
        <td>${fmtRupee(p.price)}</td>
        <td>${low ? `<span class="badge badge-danger">${p.quantity} ⚠</span>` : `<span class="badge badge-success">${p.quantity}</span>`}</td>
        <td style="color:var(--text2)">${p.unit||'pcs'}</td>
        <td><strong>${fmtRupee(val)}</strong></td>
      </tr>`;
    }).join('');
  } catch(e) { showToast(e.message, 'error'); }
}

async function loadSales() {
  try {
    const month = document.getElementById('sales-month').value;
    const year = document.getElementById('sales-year').value;
    const data = await api.get(`/reports/sales?month=${month}&year=${year}`);
    const { summary, invoices } = data;

    document.getElementById('sales-summary').innerHTML = `
      <div class="sum-box"><div class="lbl">Invoices</div><div class="val">${invoices.length}</div></div>
      <div class="sum-box"><div class="lbl">Subtotal</div><div class="val">${fmtRupee(summary.total_subtotal)}</div></div>
      <div class="sum-box"><div class="lbl">Total GST</div><div class="val" style="color:var(--warning)">${fmtRupee(parseFloat(summary.total_cgst)+parseFloat(summary.total_sgst))}</div></div>
      <div class="sum-box"><div class="lbl">Total Sales</div><div class="val brand">${fmtRupee(summary.total_amount)}</div></div>
      <div class="sum-box"><div class="lbl">Collected</div><div class="val success" style="color:var(--success)">${fmtRupee(summary.collected)}</div></div>`;

    const tbody = document.getElementById('sales-tbody');
    if (!invoices.length) { tbody.innerHTML = `<tr><td colspan="9"><div class="empty-state"><p>No invoices for this period.</p></div></td></tr>`; return; }
    tbody.innerHTML = invoices.map(inv => `<tr>
      <td><strong>${inv.invoice_no}</strong></td>
      <td>${inv.party_name || '<span style="color:var(--text3)">Walk-in</span>'}</td>
      <td>${fmtDate(inv.created_at)}</td>
      <td>${fmtRupee(inv.subtotal)}</td>
      <td style="color:var(--text2)">${fmtRupee(inv.cgst_amount)}</td>
      <td style="color:var(--text2)">${fmtRupee(inv.sgst_amount)}</td>
      <td><strong>${fmtRupee(inv.total)}</strong></td>
      <td><span class="badge badge-info">${(inv.payment_method||'').toUpperCase()}</span></td>
      <td>${statusBadge(inv.status)}</td>
    </tr>`).join('');
  } catch(e) { showToast(e.message, 'error'); }
}

async function downloadStock() {
  const cat = document.getElementById('stock-cat').value;
  await api.download('/reports/stock/pdf' + (cat ? '?category=' + encodeURIComponent(cat) : ''), 'stock-report.pdf');
}

async function downloadSales() {
  const month = document.getElementById('sales-month').value;
  const year = document.getElementById('sales-year').value;
  await api.download(`/reports/sales/pdf?month=${month}&year=${year}`, `sales-${year}-${month}.pdf`);
}

loadStock();
loadSales();
</script>
</body>
</html>
